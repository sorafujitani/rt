name: Release

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      # actions/checkout v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # dtolnay/rust-toolchain stable, pinned 2026-07-10
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable
          components: clippy, rustfmt
      # ruby/setup-ruby, pinned 2026-07-10
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          ruby-version: "3.3"
      - name: Check tag and Cargo version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            scripts/check-release-version.sh "$GITHUB_REF_NAME"
            git fetch origin main --depth=1
            test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          else
            scripts/check-release-version.sh
          fi
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets --all-features
      - name: Build smoke binary
        if: runner.os == 'macOS'
        run: cargo build --locked
      - name: Smoke test JSON commands
        if: runner.os == 'macOS'
        run: scripts/release-smoke.sh target/debug/rt

  publish:
    name: Publish GitHub Release
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --verify-tag --title "$TAG" --generate-notes
